<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Ícones NEXUS</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
        h1 { color: #3b82f6; }
        .icons { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .icon-box { text-align: center; background: #16213e; padding: 15px; border-radius: 10px; }
        canvas { display: block; margin: 0 auto 10px; border-radius: 15%; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; 
                 border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #2563eb; }
        a { color: #3b82f6; }
    </style>
</head>
<body>
    <h1>🎨 Gerador de Ícones NEXUS PWA</h1>
    <p>Clique em cada botão para baixar o ícone correspondente.</p>
    
    <div class="icons" id="icons"></div>
    
    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const container = document.getElementById('icons');
        
        function drawIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#3b82f6');
            gradient.addColorStop(1, '#1e40af');
            
            // Rounded rectangle background
            const radius = size * 0.2;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, radius);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // "N" letter
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size * 0.55}px Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', size / 2, size / 2 + size * 0.02);
            
            // Small accent dots
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(size * 0.15, size * 0.15, size * 0.03, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(size * 0.85, size * 0.85, size * 0.05, 0, Math.PI * 2);
            ctx.fill();
            
            return canvas;
        }
        
        sizes.forEach(size => {
            const box = document.createElement('div');
            box.className = 'icon-box';
            
            const canvas = drawIcon(size);
            box.appendChild(canvas);
            
            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            box.appendChild(label);
            
            const btn = document.createElement('button');
            btn.textContent = 'Download';
            btn.onclick = () => {
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            box.appendChild(btn);
            
            container.appendChild(box);
        });
        
        // Download all button
        const allBtn = document.createElement('button');
        allBtn.textContent = '📦 Download Todos';
        allBtn.style.marginTop = '20px';
        allBtn.style.fontSize = '16px';
        allBtn.onclick = () => {
            sizes.forEach(size => {
                setTimeout(() => {
                    const canvas = drawIcon(size);
                    const link = document.createElement('a');
                    link.download = `icon-${size}x${size}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }, size * 2);
            });
        };
        document.body.appendChild(allBtn);
    </script>
</body>
</html>
