<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Plataforma Unificada de Automação com IA</title>
    <meta name="description" content="Plataforma de automação inteligente com IA para MEI e pequenos negócios. Gerencie agenda, clientes, financeiro e cobranças.">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEXUS">
    <meta name="application-name" content="NEXUS">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Links -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-72x72.png">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6398044152546096"
     crossorigin="anonymous"></script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration (PRODUÇÃO apenas) -->
    <script>
      if ('serviceWorker' in navigator) {
        // Em dev (Vite porta 5173/5175), NÃO registrar SW — causa conflito com HMR
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isDev) {
          // Desregistrar qualquer SW residual de builds anteriores
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((r) => {
              r.unregister();
              console.log('🧹 Service Worker removido (modo dev):', r.scope);
            });
          });
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then((registration) => {
                console.log('✅ Service Worker registrado:', registration.scope);
              })
              .catch((error) => {
                console.log('❌ Erro ao registrar SW:', error);
              });
          });
        }
      }
    </script>
</body>
</html>
