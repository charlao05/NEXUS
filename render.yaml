services:
  # -- Backend API --
  - type: web
    name: nexus-backend
    env: python
    plan: free
    region: ohio
    rootDir: backend
    runtime: python
    buildCommand: pip install -r requirements.txt && (playwright install chromium || true) && python -c "from database.models import Base, engine; Base.metadata.create_all(engine)"
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ESSENCIAL
        sync: false
      - key: STRIPE_PRICE_PROFISSIONAL
        sync: false
      - key: STRIPE_PRICE_COMPLETO
        sync: false
      - key: FRONTEND_URL
        value: "https://app.nexxusapp.com.br"
      - key: CORS_ORIGINS
        value: "https://app.nexxusapp.com.br"
      - key: BACKEND_BASE_URL
        value: "https://api.nexxusapp.com.br"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: OPENAI_MODEL
        value: "gpt-4.1"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PORT
        value: "10000"
      - key: ENVIRONMENT
        value: "production"
      - key: NEXUS_VERSION
        value: "2.0.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: "appnexusapp_bot"
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false

  # -- Frontend SPA --
  - type: web
    name: nexus-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://api.nexxusapp.com.br"
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: NODE_VERSION
        value: "18"

databases:
  # -- PostgreSQL (producao) --
  - name: nexus-db
    plan: free
    region: ohio
    databaseName: nexus
    user: nexus_user
    ipAllowList: []
