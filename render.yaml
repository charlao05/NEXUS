services:
  # ── Backend API ──
  - type: web
    name: nexus-backend
    env: python
    plan: free
    region: ohio
    rootDir: backend
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt && python -c "from database.models import Base, engine; Base.metadata.create_all(engine)"
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false  # Internal URL do Postgres Render
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_BASE_URL
        sync: false  # Ex: https://nexus-backend.onrender.com
      - key: PORT
        value: "10000"
      - key: ENVIRONMENT
        value: "production"
      - key: NEXUS_VERSION
        value: "2.0.0"
      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Frontend SPA ──
  - type: web
    name: nexus-frontend
    env: static
    plan: free
    region: ohio
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Setar manualmente: https://nexus-backend.onrender.com
      - key: NODE_VERSION
        value: "18"

databases:
  # ── PostgreSQL (produção) ──
  - name: nexus-db
    plan: free
    region: ohio
    databaseName: nexus
    user: nexus_user
    ipAllowList: []  # Render internal only
