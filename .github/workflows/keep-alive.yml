name: Keep Alive - NEXUS Backend

on:
  schedule:
    - cron: '*/10 * * * *'  # a cada 10 minutos
  workflow_dispatch:  # permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping NEXUS Backend Health
        run: |
          echo "Pinging https://api.nexxusapp.com.br/health ..."
          curl -s --max-time 120 --retry 3 --retry-delay 10 \
            -o /tmp/health_response.json \
            -w "HTTP Status: %{http_code} | Time: %{time_total}s\n" \
            https://api.nexxusapp.com.br/health
          echo "Response body:"
          cat /tmp/health_response.json
          echo ""
          echo "Keep-alive ping completed at $(date)"
