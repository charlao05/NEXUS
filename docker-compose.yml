# ============================================================
# NEXUS — Docker Compose (Backend + Frontend + Redis)
# ============================================================
# Uso:
#   docker compose up --build        (dev)
#   docker compose -f docker-compose.yml up -d  (produção)
# ============================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      ENVIRONMENT: "production"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://frontend"
      FRONTEND_URL: "http://localhost"
      DATABASE_URL: "postgresql://nexus:nexus_secret@postgres:5432/nexus"
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Frontend (React + Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Playwright (E2E tests — perfil on-demand) ──────────────
  e2e:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    environment:
      BASE_URL: "http://frontend"
      API_URL: "http://backend:8000"
    depends_on:
      frontend:
        condition: service_healthy
    profiles:
      - test
    volumes:
      - ./e2e/results:/app/results

volumes:
  postgres_data:
  redis_data:
  backend_data:
